name: Build (Windows) - Unsigned

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Normalize project paths for CI (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $ws = $env:GITHUB_WORKSPACE
          $hise = Join-Path $ws "HISE"
          $juceVst3Sdk = Join-Path $ws "oi grandad\Binaries\JUCE\modules\juce_audio_processors_headless\format_types\VST3_SDK"
          $faustInclude = Join-Path $hise "tools\faust\include"

          if (!(Test-Path $juceVst3Sdk)) { throw "Missing JUCE bundled VST3 SDK: $juceVst3Sdk" }

          $vstProj = Join-Path $ws "oi grandad\Binaries\Builds\VisualStudio2022\oi grandad_VST3.vcxproj"
          $sharedProj = Join-Path $ws "oi grandad\Binaries\Builds\VisualStudio2022\oi grandad_SharedCode.vcxproj"

          foreach ($p in @($vstProj, $sharedProj)) {
            if (!(Test-Path $p)) { throw "Missing project file: $p" }
            $c = Get-Content -Raw -Path $p
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE\JUCE\modules\juce_audio_processors\format_types\VST3_SDK', $juceVst3Sdk)
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE\tools\SDK\VST3 SDK', $juceVst3Sdk)
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE\tools\faust\include', $faustInclude)
            $c = $c.Replace('/Users/rick/Documents/GitHub/HISE/tools/faust/include', $faustInclude)
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE', $hise)
            $c = $c.Replace('/Users/rick/Documents/GitHub/HISE', $hise)
            # Remove unresolved exporter placeholders that break CI builds.
            $c = $c.Replace('%FFT_HEADER_PATH%;', '')
            $c = $c.Replace('%FFT_LINKER_FLAGS%', '')
            $c = $c.Replace('%WIN_STATIC_LIBS%', '')
            $c = $c.Replace('%WIN_STATIC_LIB_FOLDER_R64%;', '')
            $c = $c.Replace('%WIN_STATIC_LIB_FOLDER_D64%;', '')
            $c = $c.Replace('%PREBUILD_COMMAND%;', '')
            $c = $c.Replace('%PREBUILD_COMMAND%', '')
            # Ensure IPP is not enabled in CI unless explicitly wired (melatonin_blur fallback path is fine).
            $c = $c.Replace('PAMPLEJUCE_IPP;', '')
            $c = $c.Replace('_IPP_SEQUENTIAL_STATIC;', '')
            $c = $c.Replace('PAMPLEJUCE_IPP=1;', '')
            $c = $c.Replace('_IPP_SEQUENTIAL_STATIC=1;', '')
            # Windows compatibility defines for SDK/JUCE on modern toolchains.
            $c = $c.Replace('WIN32;_WINDOWS;', 'WIN32;_WINDOWS;NOMINMAX;stricmp=_stricmp;')
            Set-Content -Path $p -Value $c -NoNewline
          }

          # Ensure VST3 string conversion units are compiled on Windows (required by some SDK/JUCE combos).
          $vstProjContent = Get-Content -Raw -Path $vstProj
          if ($vstProjContent -notmatch 'public\.sdk\\source\\vst\\utility\\stringconvert\.cpp') {
            $insert = '  <ItemGroup>`r`n' +
                      '    <ClCompile Include="..\..\JUCE\modules\juce_audio_processors_headless\format_types\VST3_SDK\public.sdk\source\common\commonstringconvert.cpp" />`r`n' +
                      '    <ClCompile Include="..\..\JUCE\modules\juce_audio_processors_headless\format_types\VST3_SDK\public.sdk\source\vst\utility\stringconvert.cpp" />`r`n' +
                      '  </ItemGroup>'
            $vstProjContent = $vstProjContent -replace '</Project>\s*$', "$insert`r`n</Project>"
            Set-Content -Path $vstProj -Value $vstProjContent -NoNewline
          }

          # HISE JUCE snapshot compatibility: IPtr must be unwrapped before assigning to auto*.
          $wrapper = Join-Path $hise "JUCE\modules\juce_audio_plugin_client\VST3\juce_VST3_Wrapper.cpp"
          if (Test-Path $wrapper) {
            $wc = Get-Content -Raw -Path $wrapper
            $wc = [regex]::Replace($wc, 'if\s*\(\s*auto\*\s+handler\s*=\s*componentHandler\s*\)', 'if (auto* handler = componentHandler.get())')
            Set-Content -Path $wrapper -Value $wc -NoNewline
          }

          # JUCE/HISE compatibility on MSVC: use CRT-prefixed case-insensitive functions.
          $juceTextDir = Join-Path $hise "JUCE\modules\juce_core\text"
          if (Test-Path $juceTextDir) {
            Get-ChildItem -Path $juceTextDir -Filter "juce_CharPointer_*.h" -File | ForEach-Object {
              $hc = Get-Content -Raw -Path $_.FullName
              $hc = [regex]::Replace($hc, '\bstricmp\b', '_stricmp')
              $hc = [regex]::Replace($hc, '\bstrnicmp\b', '_strnicmp')
              Set-Content -Path $_.FullName -Value $hc -NoNewline
            }
          }
          $asciiHdr = Join-Path $juceTextDir "juce_CharPointer_ASCII.h"
          if (Test-Path $asciiHdr) {
            $ac = Get-Content -Raw -Path $asciiHdr
            $ac = [regex]::Replace($ac, '\bstricmp\b', '_stricmp')
            $ac = [regex]::Replace($ac, '\bstrnicmp\b', '_strnicmp')
            Set-Content -Path $asciiHdr -Value $ac -NoNewline
            if (Select-String -Path $asciiHdr -Pattern '\bstricmp\b' -Quiet) {
              throw "Failed to patch stricmp in $asciiHdr"
            }
          }

          # Ensure FAUST headers exist at include path expected by HISE/JUCE.
          $faustRoot = Join-Path $faustInclude "faust"
          New-Item -ItemType Directory -Force -Path (Join-Path $faustRoot "dsp") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $faustRoot "gui") | Out-Null

          $dspSrc = Join-Path $hise "hi_faust_types\faust_wrap\dsp\dsp.h"
          $uiSrc = Join-Path $hise "hi_faust_types\faust_wrap\gui\UI.h"
          $metaSrc = Join-Path $hise "hi_faust_types\faust_wrap\gui\meta.h"
          $libfaustSrc = Join-Path $hise "hi_faust_lib\faust_wrap\dsp\libfaust.h"

          if (Test-Path $dspSrc) { Copy-Item -Force $dspSrc (Join-Path $faustRoot "dsp\dsp.h") }
          if (Test-Path $uiSrc) { Copy-Item -Force $uiSrc (Join-Path $faustRoot "gui\UI.h") }
          if (Test-Path $metaSrc) { Copy-Item -Force $metaSrc (Join-Path $faustRoot "gui\meta.h") }
          if (Test-Path $libfaustSrc) { Copy-Item -Force $libfaustSrc (Join-Path $faustRoot "dsp\libfaust.h") }

          @"
          #pragma once
          #ifndef FAUST_API
          #define FAUST_API
          #endif
          #ifndef FAUSTMAJORVERSION
          #define FAUSTMAJORVERSION 2
          #endif
          #ifndef FAUSTMINORVERSION
          #define FAUSTMINORVERSION 74
          #endif
          #ifndef FAUSTPATCHVERSION
          #define FAUSTPATCHVERSION 6
          #endif
          "@ | Set-Content -Path (Join-Path $faustRoot "export.h") -NoNewline

          # Autogenerated client shim may include a file absent in this JUCE snapshot.
          $clientUtils = Join-Path $ws "oi grandad\Binaries\JuceLibraryCode\include_juce_audio_plugin_client_utils.cpp"
          if (Test-Path $clientUtils) {
            '#include "AppConfig.h"' | Set-Content -Path $clientUtils -NoNewline
          }

          # Ensure VST3 StringConvert implementation is linked when JUCE client is built in headers-only mode.
          $clientVst3 = Join-Path $ws "oi grandad\Binaries\JuceLibraryCode\include_juce_audio_plugin_client_VST3.cpp"
          if (Test-Path $clientVst3) {
            $vc = Get-Content -Raw -Path $clientVst3
            if ($vc -notmatch "public\.sdk/source/common/commonstringconvert\.cpp") {
              $vc += "`r`n#include <public.sdk/source/common/commonstringconvert.cpp>"
            }
            if ($vc -notmatch "public\.sdk/source/vst/utility/stringconvert\.cpp") {
              $vc += "`r`n#include <public.sdk/source/vst/utility/stringconvert.cpp>"
            }
            if ($vc -notmatch "StringConvertCIShim") {
              $vc += "`r`n// StringConvertCIShim: provides the legacy 2-arg overload if this SDK/JUCE combo misses it."
              $vc += "`r`nnamespace Steinberg { namespace Vst { namespace StringConvert {"
              $vc += "`r`nbool convert (const std::string& utf8Str, Steinberg::Vst::TChar* str)"
              $vc += "`r`n{"
              $vc += "`r`n    return convert (utf8Str, str, 128);"
              $vc += "`r`n}"
              $vc += "`r`n}}}"
            }
            Set-Content -Path $clientVst3 -Value $vc -NoNewline
          }

      - name: Build VST3 (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $shared = Join-Path $env:GITHUB_WORKSPACE "oi grandad\Binaries\Builds\VisualStudio2022\oi grandad_SharedCode.vcxproj"
          $vst3 = Join-Path $env:GITHUB_WORKSPACE "oi grandad\Binaries\Builds\VisualStudio2022\oi grandad_VST3.vcxproj"
          msbuild $shared /m /t:Build /p:Configuration=Release /p:Platform=x64
          msbuild $vst3 /m /t:Build /p:Configuration=Release /p:Platform=x64

      - name: Package (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $vst3Files = Get-ChildItem -Path . -Recurse -Filter *.vst3 -File
          if ($vst3Files.Count -eq 0) {
            throw "No .vst3 files found"
          }

          foreach ($f in $vst3Files) {
            $zipPath = Join-Path "dist" ($f.Name + ".zip")
            Compress-Archive -Path $f.FullName -DestinationPath $zipPath -Force
          }

          Get-ChildItem dist

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-vst3-unsigned
          path: dist/*.zip
