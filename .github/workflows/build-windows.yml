name: Build (Windows) - Unsigned

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Normalize project paths for CI (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $ws = $env:GITHUB_WORKSPACE
          $hise = Join-Path $ws "HISE"
          $juceVst3Sdk = Join-Path $ws "oi grandad\Binaries\JUCE\modules\juce_audio_processors_headless\format_types\VST3_SDK"
          $faustInclude = Join-Path $hise "tools\faust\include"

          if (!(Test-Path $juceVst3Sdk)) { throw "Missing JUCE bundled VST3 SDK: $juceVst3Sdk" }

          $vstProj = Join-Path $ws "oi grandad\Binaries\Builds\VisualStudio2022\oi grandad_VST3.vcxproj"
          $sharedProj = Join-Path $ws "oi grandad\Binaries\Builds\VisualStudio2022\oi grandad_SharedCode.vcxproj"

          foreach ($p in @($vstProj, $sharedProj)) {
            if (!(Test-Path $p)) { throw "Missing project file: $p" }
            $c = Get-Content -Raw -Path $p
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE\JUCE\modules\juce_audio_processors\format_types\VST3_SDK', $juceVst3Sdk)
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE\tools\SDK\VST3 SDK', $juceVst3Sdk)
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE\tools\faust\include', $faustInclude)
            $c = $c.Replace('/Users/rick/Documents/GitHub/HISE/tools/faust/include', $faustInclude)
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE', $hise)
            $c = $c.Replace('/Users/rick/Documents/GitHub/HISE', $hise)
            Set-Content -Path $p -Value $c -NoNewline
          }

          # Ensure FAUST headers exist at include path expected by HISE/JUCE.
          $faustRoot = Join-Path $faustInclude "faust"
          New-Item -ItemType Directory -Force -Path (Join-Path $faustRoot "dsp") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $faustRoot "gui") | Out-Null

          $dspSrc = Join-Path $hise "hi_faust_types\faust_wrap\dsp\dsp.h"
          $uiSrc = Join-Path $hise "hi_faust_types\faust_wrap\gui\UI.h"
          $metaSrc = Join-Path $hise "hi_faust_types\faust_wrap\gui\meta.h"
          $libfaustSrc = Join-Path $hise "hi_faust_lib\faust_wrap\dsp\libfaust.h"

          if (Test-Path $dspSrc) { Copy-Item -Force $dspSrc (Join-Path $faustRoot "dsp\dsp.h") }
          if (Test-Path $uiSrc) { Copy-Item -Force $uiSrc (Join-Path $faustRoot "gui\UI.h") }
          if (Test-Path $metaSrc) { Copy-Item -Force $metaSrc (Join-Path $faustRoot "gui\meta.h") }
          if (Test-Path $libfaustSrc) { Copy-Item -Force $libfaustSrc (Join-Path $faustRoot "dsp\libfaust.h") }

          @"
          #pragma once
          #ifndef FAUST_API
          #define FAUST_API
          #endif
          #ifndef FAUSTMAJORVERSION
          #define FAUSTMAJORVERSION 2
          #endif
          #ifndef FAUSTMINORVERSION
          #define FAUSTMINORVERSION 74
          #endif
          #ifndef FAUSTPATCHVERSION
          #define FAUSTPATCHVERSION 6
          #endif
          "@ | Set-Content -Path (Join-Path $faustRoot "export.h") -NoNewline

          # Autogenerated client shim may include a file absent in this JUCE snapshot.
          $clientUtils = Join-Path $ws "oi grandad\Binaries\JuceLibraryCode\include_juce_audio_plugin_client_utils.cpp"
          if (Test-Path $clientUtils) {
            '#include "AppConfig.h"' | Set-Content -Path $clientUtils -NoNewline
          }

      - name: Build VST3 (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $proj = Join-Path $env:GITHUB_WORKSPACE "oi grandad\Binaries\Builds\VisualStudio2022\oi grandad_VST3.vcxproj"
          msbuild $proj /m /t:Build /p:Configuration=Release /p:Platform=x64

      - name: Package (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $vst3Files = Get-ChildItem -Path . -Recurse -Filter *.vst3 -File
          if ($vst3Files.Count -eq 0) {
            throw "No .vst3 files found"
          }

          foreach ($f in $vst3Files) {
            $zipPath = Join-Path "dist" ($f.Name + ".zip")
            Compress-Archive -Path $f.FullName -DestinationPath $zipPath -Force
          }

          Get-ChildItem dist

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-vst3-unsigned
          path: dist/*.zip
