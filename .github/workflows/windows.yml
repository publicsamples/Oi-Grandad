name: Windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve export roots
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pluginRoot = Join-Path $env:GITHUB_WORKSPACE "oi grandad\CIExports\vst3"
          $standaloneRoot = Join-Path $env:GITHUB_WORKSPACE "oi grandad\CIExports\standalone"
          $fallbackRoot = Join-Path $env:GITHUB_WORKSPACE "oi grandad\Binaries"

          function Test-CompleteExportRoot([string]$Root) {
            return (Test-Path (Join-Path $Root "Builds")) `
              -and (Test-Path (Join-Path $Root "Source")) `
              -and (Test-Path (Join-Path $Root "JuceLibraryCode"))
          }

          if (Test-CompleteExportRoot $pluginRoot) {
            "VST3_ROOT=$pluginRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            "VST3_ROOT=$fallbackRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

          if (Test-CompleteExportRoot $standaloneRoot) {
            "STANDALONE_ROOT=$standaloneRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            "STANDALONE_ROOT=$fallbackRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Source fingerprint (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Commit: $env:GITHUB_SHA"
          $files = @(
            "oi grandad\Binaries\Source\Plugin.cpp",
            "oi grandad\Binaries\Source\PresetData.cpp",
            "oi grandad\Binaries\Source\CopyProtection.cpp",
            "oi grandad\AdditionalSourceCode\nodes\factory.cpp",
            "oi grandad\AdditionalSourceCode\nodes\RNBO.cpp",
            "oi grandad\Binaries\JuceLibraryCode\include_juce_audio_plugin_client_VST3.cpp",
            "oi grandad\Binaries\JuceLibraryCode\include_juce_audio_plugin_client_utils.cpp"
          )
          foreach ($f in $files) {
            if (Test-Path $f) {
              $h = Get-FileHash -Algorithm SHA256 -Path $f
              Write-Host "$($h.Hash.ToLower())  $f"
            } else {
              Write-Host "MISSING  $f"
            }
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Normalize project paths for CI (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $ws = $env:GITHUB_WORKSPACE
          $hise = Join-Path $ws "HISE"
          $sdkCandidates = @(
            (Join-Path $env:VST3_ROOT "JUCE\modules\juce_audio_processors_headless\format_types\VST3_SDK"),
            (Join-Path $ws "HISE\JUCE\modules\juce_audio_processors_headless\format_types\VST3_SDK"),
            (Join-Path $ws "HISE\JUCE\modules\juce_audio_processors\format_types\VST3_SDK"),
            (Join-Path $env:VST3_ROOT "JUCE\modules\juce_audio_processors\format_types\VST3_SDK")
          )
          $juceVst3Sdk = $null
          foreach ($c in $sdkCandidates) {
            if (Test-Path (Join-Path $c "pluginterfaces\vst\vsttypes.h")) { $juceVst3Sdk = $c; break }
          }
          $faustInclude = Join-Path $hise "tools\faust\include"

          if (-not $juceVst3Sdk) { throw "Missing VST3 SDK in expected paths." }

          $vstProj = Join-Path $env:VST3_ROOT "Builds\VisualStudio2022\oi grandad_VST3.vcxproj"
          $appProj = Join-Path $env:STANDALONE_ROOT "Builds\VisualStudio2022\oi grandad_App.vcxproj"
          $sharedProj = Join-Path $env:VST3_ROOT "Builds\VisualStudio2022\oi grandad_SharedCode.vcxproj"
          $standaloneSharedProj = Join-Path $env:STANDALONE_ROOT "Builds\VisualStudio2022\oi grandad_SharedCode.vcxproj"

          foreach ($p in @($vstProj, $appProj, $sharedProj, $standaloneSharedProj)) {
            if (!(Test-Path $p)) { continue }
            $c = Get-Content -Raw -Path $p
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE\JUCE\modules\juce_audio_processors\format_types\VST3_SDK', $juceVst3Sdk)
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE\tools\SDK\VST3 SDK', $juceVst3Sdk)
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE\tools\faust\include', $faustInclude)
            $c = $c.Replace('/Users/rick/Documents/GitHub/HISE/tools/faust/include', $faustInclude)
            $c = $c.Replace('\Users\rick\Documents\GitHub\HISE', $hise)
            $c = $c.Replace('/Users/rick/Documents/GitHub/HISE', $hise)
            # Remove unresolved exporter placeholders that break CI builds.
            $c = $c.Replace('%FFT_HEADER_PATH%;', '')
            $c = $c.Replace('%FFT_LINKER_FLAGS%', '')
            $c = $c.Replace('%WIN_STATIC_LIBS%', '')
            $c = $c.Replace('%WIN_STATIC_LIB_FOLDER_R64%;', '')
            $c = $c.Replace('%WIN_STATIC_LIB_FOLDER_D64%;', '')
            $c = $c.Replace('%PREBUILD_COMMAND%;', '')
            $c = $c.Replace('%PREBUILD_COMMAND%', '')
            # Ensure IPP is not enabled in CI unless explicitly wired (melatonin_blur fallback path is fine).
            $c = $c.Replace('PAMPLEJUCE_IPP;', '')
            $c = $c.Replace('_IPP_SEQUENTIAL_STATIC;', '')
            $c = $c.Replace('PAMPLEJUCE_IPP=1;', '')
            $c = $c.Replace('_IPP_SEQUENTIAL_STATIC=1;', '')
            # Windows compatibility defines for SDK/JUCE on modern toolchains.
            $c = $c.Replace('WIN32;_WINDOWS;', 'WIN32;_WINDOWS;NOMINMAX;stricmp=_stricmp;')
            Set-Content -Path $p -Value $c -NoNewline
          }

          # Validate patched project XML before build.
          foreach ($p in @($vstProj, $appProj, $sharedProj, $standaloneSharedProj)) {
            if (!(Test-Path $p)) { continue }
            try {
              [void]([xml](Get-Content -Raw -Path $p))
            } catch {
              throw "Invalid project XML after normalization: $p`n$($_.Exception.Message)"
            }
          }

          # JUCE/HISE compatibility on MSVC: use CRT-prefixed case-insensitive functions.
          $juceTextDir = Join-Path $hise "JUCE\modules\juce_core\text"
          if (Test-Path $juceTextDir) {
            Get-ChildItem -Path $juceTextDir -Filter "juce_CharPointer_*.h" -File | ForEach-Object {
              $hc = Get-Content -Raw -Path $_.FullName
              $hc = [regex]::Replace($hc, '\bstricmp\b', '_stricmp')
              $hc = [regex]::Replace($hc, '\bstrnicmp\b', '_strnicmp')
              Set-Content -Path $_.FullName -Value $hc -NoNewline
            }
          }
          $asciiHdr = Join-Path $juceTextDir "juce_CharPointer_ASCII.h"
          if (Test-Path $asciiHdr) {
            $ac = Get-Content -Raw -Path $asciiHdr
            $ac = [regex]::Replace($ac, '\bstricmp\b', '_stricmp')
            $ac = [regex]::Replace($ac, '\bstrnicmp\b', '_strnicmp')
            Set-Content -Path $asciiHdr -Value $ac -NoNewline
            if (Select-String -Path $asciiHdr -Pattern '\bstricmp\b' -Quiet) {
              throw "Failed to patch stricmp in $asciiHdr"
            }
          }

          # Ensure FAUST headers exist at include path expected by HISE/JUCE.
          $faustRoot = Join-Path $faustInclude "faust"
          New-Item -ItemType Directory -Force -Path (Join-Path $faustRoot "dsp") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $faustRoot "gui") | Out-Null

          $dspSrc = Join-Path $hise "hi_faust_types\faust_wrap\dsp\dsp.h"
          $uiSrc = Join-Path $hise "hi_faust_types\faust_wrap\gui\UI.h"
          $metaSrc = Join-Path $hise "hi_faust_types\faust_wrap\gui\meta.h"
          $libfaustSrc = Join-Path $hise "hi_faust_lib\faust_wrap\dsp\libfaust.h"

          if (Test-Path $dspSrc) { Copy-Item -Force $dspSrc (Join-Path $faustRoot "dsp\dsp.h") }
          if (Test-Path $uiSrc) { Copy-Item -Force $uiSrc (Join-Path $faustRoot "gui\UI.h") }
          if (Test-Path $metaSrc) { Copy-Item -Force $metaSrc (Join-Path $faustRoot "gui\meta.h") }
          if (Test-Path $libfaustSrc) { Copy-Item -Force $libfaustSrc (Join-Path $faustRoot "dsp\libfaust.h") }

          @"
          #pragma once
          #ifndef FAUST_API
          #define FAUST_API
          #endif
          #ifndef FAUSTMAJORVERSION
          #define FAUSTMAJORVERSION 2
          #endif
          #ifndef FAUSTMINORVERSION
          #define FAUSTMINORVERSION 74
          #endif
          #ifndef FAUSTPATCHVERSION
          #define FAUSTPATCHVERSION 6
          #endif
          "@ | Set-Content -Path (Join-Path $faustRoot "export.h") -NoNewline

          # Autogenerated client shim may include a file absent in this JUCE snapshot.
          $clientUtils = Join-Path $env:VST3_ROOT "JuceLibraryCode\include_juce_audio_plugin_client_utils.cpp"
          if (Test-Path $clientUtils) {
            '#include "AppConfig.h"' | Set-Content -Path $clientUtils -NoNewline
          }

          # Remove stale compatibility injections from previous CI runs.
          $clientVst3 = Join-Path $env:VST3_ROOT "JuceLibraryCode\include_juce_audio_plugin_client_VST3.cpp"
          if (Test-Path $clientVst3) {
            $vc = Get-Content -Raw -Path $clientVst3
            $vc = [regex]::Replace($vc, '^\s*#include\s*<public\.sdk/source/common/commonstringconvert\.cpp>\s*\r?\n?', '', 'Multiline')
            $vc = [regex]::Replace($vc, '^\s*#include\s*<public\.sdk/source/vst/utility/stringconvert\.cpp>\s*\r?\n?', '', 'Multiline')
            $vc = [regex]::Replace($vc, '(?s)\r?\n// StringConvertCIShim:.*?\r?\n\}\}\}', '')
            Set-Content -Path $clientVst3 -Value $vc -NoNewline
          }

      - name: Build available Windows targets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Invoke-MSBuild([string]$ProjectPath, [string]$Label) {
            if (-not (Test-Path $ProjectPath)) { return }
            Write-Host "Building ${Label}: $ProjectPath"
            msbuild $ProjectPath /m /t:Build /p:Configuration=Release /p:Platform=x64 /p:PreferredToolArchitecture=x64
            if ($LASTEXITCODE -ne 0) {
              throw "MSBuild failed for $Label"
            }
          }

          $shared = Join-Path $env:VST3_ROOT "Builds\VisualStudio2022\oi grandad_SharedCode.vcxproj"
          $vst3 = Join-Path $env:VST3_ROOT "Builds\VisualStudio2022\oi grandad_VST3.vcxproj"
          $standaloneShared = Join-Path $env:STANDALONE_ROOT "Builds\VisualStudio2022\oi grandad_SharedCode.vcxproj"
          $app = Join-Path $env:STANDALONE_ROOT "Builds\VisualStudio2022\oi grandad_App.vcxproj"

          Invoke-MSBuild $shared "Windows plugin shared code"
          Invoke-MSBuild $vst3 "Windows VST3"
          Invoke-MSBuild $standaloneShared "Windows standalone shared code"
          Invoke-MSBuild $app "Windows standalone app"

      - name: Package (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $vst3Files = @()
          if (Test-Path $env:VST3_ROOT) {
            $vst3Files = Get-ChildItem -Path $env:VST3_ROOT -Recurse -Filter *.vst3 -File
          }
          foreach ($f in $vst3Files) {
            $zipPath = Join-Path "dist" ($f.Name + ".zip")
            Compress-Archive -Path $f.FullName -DestinationPath $zipPath -Force
          }

          $appDir = Join-Path $env:STANDALONE_ROOT "Compiled\App"
          if (Test-Path $appDir) {
            $appExe = Get-ChildItem -Path $appDir -Filter *.exe -File
            if ($appExe.Count -gt 0) {
              $zipPath = Join-Path "dist" "oi-grandad-windows-app.zip"
              Compress-Archive -Path (Join-Path $appDir "*") -DestinationPath $zipPath -Force
            }
          }

          $distFiles = Get-ChildItem dist -File
          if ($distFiles.Count -eq 0) {
            throw "No Windows build artifacts found"
          }

          Get-ChildItem dist

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds-unsigned
          path: dist/*.zip
