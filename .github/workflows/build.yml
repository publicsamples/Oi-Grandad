name: Build (Mac/Win/Linux) - Unsigned

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rewrite hardcoded paths for CI (macOS)
        shell: bash
        run: |
          set -euo pipefail
          test -e HISE || ln -s "oi grandad/Binaries" HISE
          pbxproj="oi grandad/Binaries/Builds/MacOSX/oi grandad.xcodeproj/project.pbxproj"
          test -f "$pbxproj"

          HISE_ROOT="$GITHUB_WORKSPACE/HISE" perl -0pi -e '
            s#/Users/rick/Documents/GitHub/HISE#$ENV{HISE_ROOT}#g;
            s#/JUCE/modules/juce_audio_processors/format_types/VST3_SDK#/JUCE/modules/juce_audio_processors_headless/format_types/VST3_SDK#g;
          ' "$pbxproj"

      - name: Sanity check JUCE modules path
        run: |
          ls -la "oi grandad/Binaries/JUCE/modules/juce_audio_plugin_client" || exit 1
          test -f "oi grandad/Binaries/JUCE/modules/juce_audio_plugin_client/juce_audio_plugin_client_VST3.cpp" || exit 1

      - name: Build VST3 (macOS)
        run: |
          xcodebuild \
            -project "oi grandad/Binaries/Builds/MacOSX/oi grandad.xcodeproj" \
            -scheme "oi grandad - VST3" \
            -configuration Release \
            MACOSX_DEPLOYMENT_TARGET=10.13 \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build AU (macOS)
        run: |
          xcodebuild \
            -project "oi grandad/Binaries/Builds/MacOSX/oi grandad.xcodeproj" \
            -scheme "oi grandad - AU" \
            -configuration Release \
            MACOSX_DEPLOYMENT_TARGET=10.13 \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package (macOS)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          echo "Searching for .vst3 and .component bundles..."
          find . -type d \( -name "*.vst3" -o -name "*.component" \) -print > bundles.txt
          cat bundles.txt

          if [ ! -s bundles.txt ]; then
            echo "ERROR: No .vst3 or .component bundles found."
            exit 1
          fi

          while IFS= read -r bundle; do
            name="$(basename "$bundle")"
            echo "Zipping $bundle -> dist/$name.zip"
            ditto -c -k --sequesterRsrc --keepParent "$bundle" "dist/$name.zip"
          done < bundles.txt

          ls -la dist

      - name: Upload artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: mac-au-vst3-unsigned
          path: dist/*.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rewrite hardcoded paths for CI (Windows)
        shell: pwsh
        run: |
          if (-not (Test-Path "HISE")) {
            New-Item -ItemType Junction -Path "HISE" -Target "oi grandad\Binaries" | Out-Null
          }

          $hiseRootPosix = "$env:GITHUB_WORKSPACE/HISE"
          $hiseRootWin = ($hiseRootPosix -replace '/', '\')

          $files = @(
            "oi grandad\Binaries\Builds\VisualStudio2022\oi grandad_VST3.vcxproj",
            "oi grandad\Binaries\Builds\VisualStudio2022\oi grandad_SharedCode.vcxproj"
          )

          foreach ($file in $files) {
            if (-not (Test-Path $file)) { throw "Missing file: $file" }
            $content = Get-Content -Raw $file
            $content = $content.Replace('\Users\rick\Documents\GitHub\HISE', $hiseRootWin)
            $content = $content.Replace('/Users/rick/Documents/GitHub/HISE', $hiseRootPosix)
            $content = $content.Replace('JUCE\modules\juce_audio_processors\format_types\VST3_SDK', 'JUCE\modules\juce_audio_processors_headless\format_types\VST3_SDK')
            $content = $content.Replace('JUCE/modules/juce_audio_processors/format_types/VST3_SDK', 'JUCE/modules/juce_audio_processors_headless/format_types/VST3_SDK')
            Set-Content -Path $file -Value $content -NoNewline
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build VST3 (Windows)
        shell: pwsh
        run: |
          $sln = "oi grandad\Binaries\Builds\VisualStudio2022\oi grandad.sln"
          if (-not (Test-Path $sln)) {
            throw "Solution not found: $sln"
          }
          msbuild $sln /m /p:Configuration=Release /p:Platform=x64

      - name: Package (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $bundles = Get-ChildItem -Recurse -Directory -Filter *.vst3
          if (-not $bundles) { throw "No .vst3 bundles found after build." }

          $bundles | ForEach-Object {
            $zipName = "dist\$($_.Name)-windows.zip"
            Write-Host "Zipping $($_.FullName) -> $zipName"
            Compress-Archive -Path $_.FullName -DestinationPath $zipName -Force
          }

          Get-ChildItem dist

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-vst3-unsigned
          path: dist/*.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rewrite hardcoded paths for CI (Linux)
        shell: bash
        run: |
          set -euo pipefail
          test -e HISE || ln -s "oi grandad/Binaries" HISE
          makefile="oi grandad/Binaries/Builds/LinuxMakefile/Makefile"
          test -f "$makefile"

          HISE_ROOT="$GITHUB_WORKSPACE/HISE" perl -0pi -e '
            s#/Users/rick/Documents/GitHub/HISE#$ENV{HISE_ROOT}#g;
            s#/JUCE/modules/juce_audio_processors/format_types/VST3_SDK#/JUCE/modules/juce_audio_processors_headless/format_types/VST3_SDK#g;
          ' "$makefile"

      - name: Build VST3 (Linux)
        shell: bash
        run: |
          set -e
          cd "oi grandad/Binaries/Builds/LinuxMakefile"
          make CONFIG=Release -j"$(nproc)"

      - name: Package (Linux)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          echo "Searching for .vst3 bundles..."
          find . -type d -name "*.vst3" -print > bundles.txt
          cat bundles.txt

          if [ ! -s bundles.txt ]; then
            echo "ERROR: No .vst3 bundles found after build."
            exit 1
          fi

          while IFS= read -r bundle; do
            name="$(basename "$bundle")"
            echo "Zipping $bundle -> dist/$name-linux.zip"
            (cd "$(dirname "$bundle")" && zip -r "$OLDPWD/dist/$name-linux.zip" "$name" >/dev/null)
          done < bundles.txt

          ls -la dist

      - name: Upload artifacts (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: linux-vst3-unsigned
          path: dist/*.zip
