name: Build (macOS) - Unsigned

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure VST3 SDK headers exist
        shell: bash
        run: |
          set -euo pipefail
          sdk_dir="$GITHUB_WORKSPACE/HISE/tools/SDK/VST3 SDK"
          sdk_header="$sdk_dir/pluginterfaces/vst/vsttypes.h"
          sdk_flock="$sdk_dir/base/source/flock.cpp"
          headless_sdk_dir="$GITHUB_WORKSPACE/HISE/JUCE/modules/juce_audio_processors_headless/format_types/VST3_SDK"
          sdk_zip="$GITHUB_WORKSPACE/HISE/tools/SDK/sdk.zip"
          sdk_parent="$(dirname "$sdk_dir")"

          if [[ ! -f "$sdk_header" || ! -f "$sdk_flock" ]]; then
            echo "VST3 SDK is missing required files. Preparing SDK..."
            mkdir -p "$sdk_parent"

            # Prefer a modern SDK snapshot (contains base/source/flock.cpp).
            rm -rf "$GITHUB_WORKSPACE/_vst3sdk.tar.gz" "$GITHUB_WORKSPACE"/vst3sdk-* "$GITHUB_WORKSPACE"/steinbergmedia-vst3sdk-*
            fetch_ok=0
            for ref in master main; do
              url="https://codeload.github.com/steinbergmedia/vst3sdk/tar.gz/refs/heads/$ref"
              echo "Downloading $url"
              if curl --fail --location --retry 3 --retry-delay 2 --output "$GITHUB_WORKSPACE/_vst3sdk.tar.gz" "$url"; then
                tar -xzf "$GITHUB_WORKSPACE/_vst3sdk.tar.gz" -C "$GITHUB_WORKSPACE"
                extracted="$(find "$GITHUB_WORKSPACE" -maxdepth 1 -type d \( -name 'vst3sdk-*' -o -name 'steinbergmedia-vst3sdk-*' \) | head -n1)"
                if [[ -n "${extracted:-}" && -f "$extracted/base/source/flock.cpp" ]]; then
                  rm -rf "$sdk_dir"
                  mv "$extracted" "$sdk_dir"
                  fetch_ok=1
                  break
                fi
              fi
            done

            # Fallback for offline runs: use bundled legacy sdk.zip.
            if [[ "$fetch_ok" -ne 1 && -f "$sdk_zip" ]]; then
              echo "Modern SDK download unavailable. Extracting bundled $sdk_zip"
              unzip -q -o "$sdk_zip" -d "$sdk_parent"
            fi
          fi

          if [[ ! -e "$headless_sdk_dir" ]]; then
            mkdir -p "$(dirname "$headless_sdk_dir")"
            ln -s "$sdk_dir" "$headless_sdk_dir"
          fi

          test -f "$sdk_header"
          test -f "$sdk_flock"
          test -f "$headless_sdk_dir/pluginterfaces/vst/vsttypes.h"

      - name: Rewrite hardcoded paths for CI (macOS)
        shell: bash
        run: |
          set -euo pipefail
          test -e HISE || ln -s "oi grandad/Binaries" HISE
          pbxproj="oi grandad/Binaries/Builds/MacOSX/oi grandad.xcodeproj/project.pbxproj"
          client_utils_cpp="oi grandad/Binaries/JuceLibraryCode/include_juce_audio_plugin_client_utils.cpp"
          vst_utils_mm="oi grandad/Binaries/JuceLibraryCode/include_juce_audio_plugin_client_VST_utils.mm"
          test -f "$pbxproj"
          test -f "$client_utils_cpp"
          test -f "$vst_utils_mm"

          HISE_ROOT="$GITHUB_WORKSPACE/HISE" perl -0pi -e '
            s#/Users/rick/Documents/GitHub/HISE#$ENV{HISE_ROOT}#g;
            s#/JUCE/modules/juce_audio_processors/format_types/VST3_SDK#/JUCE/modules/juce_audio_processors_headless/format_types/VST3_SDK#g;
          ' "$pbxproj"

          # JUCE's VST3 client pulls ObjC syntax on macOS; ensure this TU is compiled as ObjC++.
          perl -0pi -e '
            s#(include_juce_audio_plugin_client_VST3\\.cpp \\*/ = \\{isa = PBXBuildFile; fileRef = [A-F0-9]+;)(\\s*\\};)#$1 settings = {COMPILER_FLAGS = "-x objective-c++"; };$2#g;
          ' "$pbxproj"

          # This autogenerated shim references a removed JUCE source file in newer JUCE versions.
          # Keep the TU valid as a no-op so Xcode can continue building.
          cat > "$client_utils_cpp" <<'EOF'
          /*
              CI patch: juce_audio_plugin_client_utils.cpp no longer exists in this JUCE version.
              Leave this translation unit intentionally empty.
          */
          #include "AppConfig.h"
          EOF

          # VST2 utility shim may also be stale with newer JUCE snapshots.
          cat > "$vst_utils_mm" <<'EOF'
          /*
              CI patch: juce_audio_plugin_client_VST_utils.mm no longer exists in this JUCE version.
              Leave this translation unit intentionally empty.
          */
          #include "AppConfig.h"
          EOF

      - name: Sanity check JUCE modules path
        run: |
          ls -la "oi grandad/Binaries/JUCE/modules/juce_audio_plugin_client" || exit 1
          test -f "oi grandad/Binaries/JUCE/modules/juce_audio_plugin_client/juce_audio_plugin_client_VST3.cpp" || exit 1

      - name: Preflight generated shim includes (macOS)
        shell: bash
        run: |
          set -euo pipefail
          # CI preflight: fail fast when generated shim includes cannot be resolved.
          base="$GITHUB_WORKSPACE/oi grandad/Binaries"
          cd "$base"

          include_roots=(
            "$base/JuceLibraryCode"
            "$GITHUB_WORKSPACE/HISE"
            "$GITHUB_WORKSPACE/HISE/JUCE/modules"
            "$GITHUB_WORKSPACE/HISE/JUCE/modules/juce_audio_plugin_client"
            "$GITHUB_WORKSPACE/HISE/JUCE/modules/juce_audio_processors_headless/format_types/VST3_SDK"
            "$GITHUB_WORKSPACE/HISE/tools/SDK/VST3 SDK"
          )

          resolve_include() {
            local rel="$1"
            local d
            for d in "${include_roots[@]}"; do
              if [[ -f "$d/$rel" ]]; then
                return 0
              fi
            done
            return 1
          }

          missing_file="$(mktemp)"
          checked=0
          while IFS= read -r -d '' shim; do
            inc="$(sed -n 's/^#include <\(.*\)>/\1/p' "$shim" | head -n1 | tr -d '\r')"
            [[ -z "$inc" ]] && continue
            checked=$((checked + 1))
            if ! resolve_include "$inc"; then
              printf '%s\t%s\n' "$shim" "$inc" >> "$missing_file"
            fi
          done < <(find JuceLibraryCode -maxdepth 1 -type f \( -name 'include_*.cpp' -o -name 'include_*.mm' -o -name 'include_*.c' \) -print0)

          missing_count="$(wc -l < "$missing_file" | tr -d ' ')"
          echo "Shim preflight checked: $checked"
          echo "Shim preflight unresolved: $missing_count"

          if [[ "$missing_count" -gt 0 ]]; then
            echo "Unresolved generated shim includes:"
            sort "$missing_file"
            exit 1
          fi

      - name: Build VST3 (macOS)
        run: |
          xcodebuild \
            -project "oi grandad/Binaries/Builds/MacOSX/oi grandad.xcodeproj" \
            -scheme "oi grandad - VST3" \
            -configuration Release \
            MACOSX_DEPLOYMENT_TARGET=10.13 \
            OTHER_CPLUSPLUSFLAGS="-x objective-c++" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build AU (macOS)
        run: |
          xcodebuild \
            -project "oi grandad/Binaries/Builds/MacOSX/oi grandad.xcodeproj" \
            -scheme "oi grandad - AU" \
            -configuration Release \
            MACOSX_DEPLOYMENT_TARGET=10.13 \
            OTHER_CPLUSPLUSFLAGS="-x objective-c++" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package (macOS)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          echo "Searching for .vst3 and .component bundles..."
          find . -type d \( -name "*.vst3" -o -name "*.component" \) -print > bundles.txt
          cat bundles.txt

          if [ ! -s bundles.txt ]; then
            echo "ERROR: No .vst3 or .component bundles found."
            exit 1
          fi

          while IFS= read -r bundle; do
            name="$(basename "$bundle")"
            echo "Zipping $bundle -> dist/$name.zip"
            ditto -c -k --sequesterRsrc --keepParent "$bundle" "dist/$name.zip"
          done < bundles.txt

          ls -la dist

      - name: Upload artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: mac-au-vst3-unsigned
          path: dist/*.zip
