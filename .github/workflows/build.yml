name: Build (macOS) - Unsigned

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rewrite hardcoded paths for CI (macOS)
        shell: bash
        run: |
          set -euo pipefail
          test -e HISE || ln -s "oi grandad/Binaries" HISE
          pbxproj="oi grandad/Binaries/Builds/MacOSX/oi grandad.xcodeproj/project.pbxproj"
          client_utils_cpp="oi grandad/Binaries/JuceLibraryCode/include_juce_audio_plugin_client_utils.cpp"
          vst_utils_mm="oi grandad/Binaries/JuceLibraryCode/include_juce_audio_plugin_client_VST_utils.mm"
          test -f "$pbxproj"
          test -f "$client_utils_cpp"
          test -f "$vst_utils_mm"

          HISE_ROOT="$GITHUB_WORKSPACE/HISE" perl -0pi -e '
            s#/Users/rick/Documents/GitHub/HISE#$ENV{HISE_ROOT}#g;
            s#/JUCE/modules/juce_audio_processors/format_types/VST3_SDK#/JUCE/modules/juce_audio_processors_headless/format_types/VST3_SDK#g;
          ' "$pbxproj"

          # JUCE's VST3 client pulls ObjC syntax on macOS; ensure this TU is compiled as ObjC++.
          perl -0pi -e '
            s#(include_juce_audio_plugin_client_VST3\\.cpp \\*/ = \\{isa = PBXBuildFile; fileRef = [A-F0-9]+;)(\\s*\\};)#$1 settings = {COMPILER_FLAGS = "-x objective-c++"; };$2#g;
          ' "$pbxproj"

          # This autogenerated shim references a removed JUCE source file in newer JUCE versions.
          # Keep the TU valid as a no-op so Xcode can continue building.
          cat > "$client_utils_cpp" <<'EOF'
          /*
              CI patch: juce_audio_plugin_client_utils.cpp no longer exists in this JUCE version.
              Leave this translation unit intentionally empty.
          */
          #include "AppConfig.h"
          EOF

          # VST2 utility shim may also be stale with newer JUCE snapshots.
          cat > "$vst_utils_mm" <<'EOF'
          /*
              CI patch: juce_audio_plugin_client_VST_utils.mm no longer exists in this JUCE version.
              Leave this translation unit intentionally empty.
          */
          #include "AppConfig.h"
          EOF

      - name: Sanity check JUCE modules path
        run: |
          ls -la "oi grandad/Binaries/JUCE/modules/juce_audio_plugin_client" || exit 1
          test -f "oi grandad/Binaries/JUCE/modules/juce_audio_plugin_client/juce_audio_plugin_client_VST3.cpp" || exit 1

      - name: Build VST3 (macOS)
        run: |
          xcodebuild \
            -project "oi grandad/Binaries/Builds/MacOSX/oi grandad.xcodeproj" \
            -scheme "oi grandad - VST3" \
            -configuration Release \
            MACOSX_DEPLOYMENT_TARGET=10.13 \
            OTHER_CPLUSPLUSFLAGS="-x objective-c++" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build AU (macOS)
        run: |
          xcodebuild \
            -project "oi grandad/Binaries/Builds/MacOSX/oi grandad.xcodeproj" \
            -scheme "oi grandad - AU" \
            -configuration Release \
            MACOSX_DEPLOYMENT_TARGET=10.13 \
            OTHER_CPLUSPLUSFLAGS="-x objective-c++" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package (macOS)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          echo "Searching for .vst3 and .component bundles..."
          find . -type d \( -name "*.vst3" -o -name "*.component" \) -print > bundles.txt
          cat bundles.txt

          if [ ! -s bundles.txt ]; then
            echo "ERROR: No .vst3 or .component bundles found."
            exit 1
          fi

          while IFS= read -r bundle; do
            name="$(basename "$bundle")"
            echo "Zipping $bundle -> dist/$name.zip"
            ditto -c -k --sequesterRsrc --keepParent "$bundle" "dist/$name.zip"
          done < bundles.txt

          ls -la dist

      - name: Upload artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: mac-au-vst3-unsigned
          path: dist/*.zip
